<div class="row">
  <div class="col-md-8 col-md-offset-2">
    <table class="table responsive table-hover">
      <thead>
        <tr>
          <th><i class="entypo-picture"> Foto</th>
          <th><i class="entypo-tag"> Nombre</th>
          <th><i class="entypo-eye"> Visitas</th>
          <th><i class="entypo-target"> Interesados</th>
        </tr>
      </thead>

      <tbody>
        <tr ng-repeat="item in offer_items | orderBy:'-' track by $index">
          <td ng-click="viewItem(item.id)" class="pointer"><img src="{{'/storage/items/' + item.avatar}}" width="60px"></td>
          <td ng-click="viewItem(item.id)" class="pointer">{{item.name}}</td>
          <td ng-click="viewItem(item.id)" class="pointer">{{item.views}}</td>
          <td ng-click="viewItem(item.id)" class="pointer">{{item.interested}}</td>
        </tr>
      </tbody>
    </table>

  </div>
</div>

<div class="row">
  <div class="col-md-10 col-md-offset-1">
    <h4>Comentarios del interesado</h4>
  </div>
</div>

<div class="row">
  <div class="col-md-10 col-md-offset-1">
    <div class="">
      <div class="dropzone">
        <h4>{{offer.comment}}</h4>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-10 col-md-offset-1 text-center">
    <br>
    <button ng-click="triggerOffer()" type="button" class="btn btn-green btn-lg btn-icon icon-left">Aceptar Oferta<i class="entypo-check"></i></button>
    <button ng-click="triggerOffer()" type="button" class="btn btn-red btn-lg btn-icon icon-left">Rechazar Oferta<i class="entypo-trash"></i></button>

  </div>
</div>
